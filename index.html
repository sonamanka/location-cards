<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>📍 Location Cards</h1>
    <button id="openAddModal">+ Add Location</button>
  </header>

  <main id="cardsContainer">
    <p id="loadingMsg">Loading locations...</p>
  </main>

  <!-- Add / Edit Modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle">Add Location</h2>
      <input type="text"      id="fieldName"        placeholder="Name"        />
      <textarea              id="fieldDescription" placeholder="Description"></textarea>
      <input type="text"      id="fieldAddress"     placeholder="Address"     />
      <input type="file"      id="fieldImage"       accept="image/*"          />
      <img   id="imagePreview" src="" alt="" class="hidden" />
      <div class="modal-actions">
        <button id="saveBtn">Save</button>
        <button id="cancelBtn" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="deleteModal" class="modal hidden">
    <div class="modal-box">
      <h2>Delete this location?</h2>
      <p>This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirmDeleteBtn" class="danger">Delete</button>
        <button id="cancelDeleteBtn" class="secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
